<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoCalc Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050508;
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  color: #666;
  font-size: 13px;
  margin-bottom: 25px;
}

/* Ticker */
.ticker {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.ticker-item {
  flex: 1;
  background: #111;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  border-top: 2px solid #222;
}
.ticker-item.btc { border-top-color: #f7931a; }
.ticker-item.eth { border-top-color: #627eea; }
.ticker-item.sol { border-top-color: #9945ff; }

.ticker-price {
  font-weight: bold;
  transition: color 0.3s;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  background: #111;
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
}
.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
}
.mode-btn.active {
  background: orange;
  color: #000;
}

/* Select (mobile improved) */
select {
  width: 100%;
  padding: 16px;
  margin-bottom: 14px;
  background: #ffffff;
  border: 1px solid #ddd;
  color: #000;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  appearance: none;

  background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 16px;
}

/* Input */
.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.input-row input {
  flex: 1;
  padding: 14px;
  background: #111;
  border: 1px solid #222;
  color: #fff;
  border-radius: 6px;
  font-size: 16px;
}

/* Button */
#recalcBtn {
  width: 60px;
  background: orange;
  border: none;
  border-radius: 6px;
  color: #000;
  cursor: pointer;
}

/* Result */
.result {
  margin-top: 18px;
  padding: 20px;
  background: #111;
  border-radius: 8px;
  display: none;
}
.result.visible { display: block; }

.result-title {
  text-align: center;
  font-size: 14px;
  color: #aaa;
  margin-bottom: 14px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #2a2a2a;
}
</style>
</head>

<body>

<div class="container">

<h1>CRYPTO CALC</h1>
<p class="subtitle">Live crypto + instant conversion</p>

<div class="ticker">
  <div class="ticker-item btc">BTC <div id="btc" class="ticker-price">—</div></div>
  <div class="ticker-item eth">ETH <div id="eth" class="ticker-price">—</div></div>
  <div class="ticker-item sol">SOL <div id="sol" class="ticker-price">—</div></div>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="usdBtn" onclick="setMode('usd')">USD → Crypto</button>
  <button class="mode-btn" id="cryptoBtn" onclick="setMode('crypto')">Crypto → USD</button>
</div>

<select id="coin">
  <option value="all">All Coins</option>
  <option value="btc">Bitcoin</option>
  <option value="eth">Ethereum</option>
  <option value="sol">Solana</option>
</select>

<div class="input-row">
  <input type="number" id="amount" placeholder="Enter amount" oninput="autoConvert()">
  <button id="recalcBtn" onclick="convert()">↻</button>
</div>

<div class="result" id="result"></div>

<p class="footer">AUTO REFRESH EVERY 30s</p>

</div>

<script>
let prices = {};
let lastPrices = {};
let mode = "usd";
let timer;

async function loadPrices() {
  try {
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd");
    const data = await res.json();

    prices = {
      btc: data.bitcoin.usd,
      eth: data.ethereum.usd,
      sol: data.solana.usd
    };

  } catch {
    const [btc, eth, sol] = await Promise.all([
      fetch("https://api.coincap.io/v2/assets/bitcoin"),
      fetch("https://api.coincap.io/v2/assets/ethereum"),
      fetch("https://api.coincap.io/v2/assets/solana")
    ]);

    prices = {
      btc: parseFloat((await btc.json()).data.priceUsd),
      eth: parseFloat((await eth.json()).data.priceUsd),
      sol: parseFloat((await sol.json()).data.priceUsd)
    };
  }

  updateTicker();
}

function updateTicker() {
  updateCoin("btc", prices.btc);
  updateCoin("eth", prices.eth);
  updateCoin("sol", prices.sol);
}

function updateCoin(id, price) {
  const el = document.getElementById(id);
  el.textContent = "$" + price.toLocaleString();

  if (lastPrices[id]) {
    if (price > lastPrices[id]) el.style.color = "#22c55e";
    else if (price < lastPrices[id]) el.style.color = "#ef4444";
  }

  lastPrices[id] = price;
}

function setMode(m) {
  mode = m;
  document.getElementById("usdBtn").classList.toggle("active", m==="usd");
  document.getElementById("cryptoBtn").classList.toggle("active", m==="crypto");
}

function autoConvert() {
  clearTimeout(timer);
  timer = setTimeout(convert, 300);
}

function convert() {
  const amount = parseFloat(document.getElementById("amount").value);
  const coin = document.getElementById("coin").value;

  if (!amount || amount <= 0) return;

  let html = "";

  if (mode === "usd") {
    html += `<div class="result-title">For $${amount.toLocaleString()} you get:</div>`;

    if (coin === "all") {
      html += row("Bitcoin", amount / prices.btc, "BTC");
      html += row("Ethereum", amount / prices.eth, "ETH");
      html += row("Solana", amount / prices.sol, "SOL");
    } else {
      const val = amount / prices[coin];
      const name = coin==="btc"?"Bitcoin":coin==="eth"?"Ethereum":"Solana";
      html += row(name, val, coin.toUpperCase());
    }
  } else {
    if (coin === "all") {
      html += `<div class="result-title">Value of ${amount} units:</div>`;
      html += usdRow("Bitcoin", amount * prices.btc);
      html += usdRow("Ethereum", amount * prices.eth);
      html += usdRow("Solana", amount * prices.sol);
    } else {
      const val = amount * prices[coin];
      const name = coin==="btc"?"Bitcoin":coin==="eth"?"Ethereum":"Solana";
      html += `<div class="result-title">For ${amount} ${coin.toUpperCase()} you get:</div>`;
      html += usdRow(name, val);
    }
  }

  document.getElementById("result").innerHTML = html;
  document.getElementById("result").classList.add("visible");
}

function row(name, value, sym) {
  let c = name==="Bitcoin"?"#f7931a":name==="Ethereum"?"#627eea":"#9945ff";
  return `<div class="row">
    <span>${name}</span>
    <b style="color:${c}">${value.toFixed(6)} ${sym}</b>
  </div>`;
}

function usdRow(name, value) {
  let c = name==="Bitcoin"?"#f7931a":name==="Ethereum"?"#627eea":"#9945ff";
  return `<div class="row">
    <span>${name}</span>
    <b style="color:${c}">$${value.toLocaleString()}</b>
  </div>`;
}

loadPrices();
setInterval(loadPrices, 30000);
</script>

</body>
</html>
