<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoCalc Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050508;
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  color: #666;
  font-size: 13px;
  margin-bottom: 25px;
}

/* Ticker */
.ticker {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.ticker-item {
  flex: 1;
  background: #111;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  border-top: 2px solid #222;
}
.ticker-item.btc { border-top-color: #f7931a; }
.ticker-item.eth { border-top-color: #627eea; }
.ticker-item.sol { border-top-color: #9945ff; }

.ticker-symbol {
  font-size: 11px;
  color: #888;
}
.ticker-price {
  font-size: 14px;
  font-weight: bold;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  background: #111;
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
}
.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
}
.mode-btn.active {
  background: orange;
  color: #000;
}

/* Inputs layout */
.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.input-row input {
  flex: 1;
  padding: 14px;
  background: #111;
  border: 1px solid #222;
  color: #fff;
  border-radius: 6px;
}

#recalcBtn {
  width: 60px;
  background: orange;
  border: none;
  border-radius: 6px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
#recalcBtn:hover {
  opacity: 0.9;
}

select {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  background: #111;
  border: 1px solid #222;
  color: #fff;
  border-radius: 6px;
}

/* Result */
.result {
  margin-top: 18px;
  padding: 20px;
  background: #111;
  border-radius: 8px;
  display: none;
}
.result.visible { display: block; }

.result-main {
  font-size: 28px;
  font-weight: bold;
  color: #22c55e;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.footer {
  text-align: center;
  margin-top: 25px;
  font-size: 11px;
  color: #2a2a2a;
}
</style>
</head>

<body>

<div class="container">

<h1>CRYPTO CALC</h1>
<p class="subtitle">Live crypto + instant conversion</p>

<!-- Ticker -->
<div class="ticker">
  <div class="ticker-item btc">
    <div class="ticker-symbol">BTC</div>
    <div class="ticker-price" id="btc">—</div>
  </div>
  <div class="ticker-item eth">
    <div class="ticker-symbol">ETH</div>
    <div class="ticker-price" id="eth">—</div>
  </div>
  <div class="ticker-item sol">
    <div class="ticker-symbol">SOL</div>
    <div class="ticker-price" id="sol">—</div>
  </div>
</div>

<!-- Mode -->
<div class="mode-toggle">
  <button class="mode-btn active" id="usdBtn" onclick="setMode('usd')">USD → Crypto</button>
  <button class="mode-btn" id="cryptoBtn" onclick="setMode('crypto')">Crypto → USD</button>
</div>

<select id="coin" onchange="clearResult()">
  <option value="all">All Coins</option>
  <option value="btc">Bitcoin</option>
  <option value="eth">Ethereum</option>
  <option value="sol">Solana</option>
</select>

<!-- Input + Recalc -->
<div class="input-row">
  <input type="number" id="amount" placeholder="Enter amount" oninput="autoConvert()">
  <button id="recalcBtn" onclick="convert()">↻</button>
</div>

<div class="result" id="result"></div>

<p class="footer">AUTO REFRESH PRICES EVERY 30s</p>

</div>

<script>
let prices = {};
let mode = "usd";
let timer;

/* LIVE PRICES */
async function loadPrices() {
  try {
    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd"
    );
    const data = await res.json();

    prices = {
      btc: data.bitcoin.usd,
      eth: data.ethereum.usd,
      sol: data.solana.usd
    };

  } catch {
    const [btc, eth, sol] = await Promise.all([
      fetch("https://api.coincap.io/v2/assets/bitcoin"),
      fetch("https://api.coincap.io/v2/assets/ethereum"),
      fetch("https://api.coincap.io/v2/assets/solana")
    ]);

    prices = {
      btc: parseFloat((await btc.json()).data.priceUsd),
      eth: parseFloat((await eth.json()).data.priceUsd),
      sol: parseFloat((await sol.json()).data.priceUsd)
    };
  }

  updateTicker();
}

/* UPDATE */
function updateTicker() {
  document.getElementById("btc").textContent = "$" + prices.btc.toLocaleString();
  document.getElementById("eth").textContent = "$" + prices.eth.toLocaleString();
  document.getElementById("sol").textContent = "$" + prices.sol.toLocaleString();
}

/* MODE */
function setMode(m) {
  mode = m;
  document.getElementById("usdBtn").classList.toggle("active", m==="usd");
  document.getElementById("cryptoBtn").classList.toggle("active", m==="crypto");
  clearResult();
}

/* AUTO */
function autoConvert() {
  clearTimeout(timer);
  timer = setTimeout(convert, 300);
}

/* CONVERT */
function convert() {
  const amount = parseFloat(document.getElementById("amount").value);
  const coin = document.getElementById("coin").value;

  if (!amount || amount <= 0 || !prices.btc) return;

  let html = "";

  if (mode === "usd") {
    if (coin === "all") {
      html += `<div>For $${amount.toLocaleString()} you get:</div><br>`;
      html += row("Bitcoin", amount / prices.btc, "BTC");
      html += row("Ethereum", amount / prices.eth, "ETH");
      html += row("Solana", amount / prices.sol, "SOL");
    } else {
      const val = amount / prices[coin];
      html = `<div class="result-main">${val.toFixed(6)} ${coin.toUpperCase()}</div>`;
    }
  } else {
    if (coin === "all") {
      html += `<div>Value of ${amount} units:</div><br>`;
      html += row("Bitcoin", amount * prices.btc, "$");
      html += row("Ethereum", amount * prices.eth, "$");
      html += row("Solana", amount * prices.sol, "$");
    } else {
      const val = amount * prices[coin];
      html = `<div class="result-main">$${val.toLocaleString()}</div>`;
    }
  }

  const box = document.getElementById("result");
  box.innerHTML = html;
  box.classList.add("visible");
}

function row(name, value, sym) {
  return `<div class="row">
    <span>${name}</span>
    <b>${sym === "$" ? "$"+value.toLocaleString() : value.toFixed(6)+" "+sym}</b>
  </div>`;
}

function clearResult() {
  document.getElementById("result").classList.remove("visible");
}

/* INIT */
loadPrices();
setInterval(loadPrices, 30000);
</script>

</body>
</html>
