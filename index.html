<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CryptoCalc Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050508;
  color: #fff;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

h1 { text-align: center; margin-bottom: 6px; }

.subtitle {
  text-align: center;
  color: #666;
  font-size: 13px;
  margin-bottom: 25px;
}

/* Ticker */
.ticker {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.ticker-item {
  flex: 1;
  background: #111;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  border-top: 2px solid #222;
}

.ticker-item.btc { border-top-color: #f7931a; }
.ticker-item.eth { border-top-color: #627eea; }
.ticker-item.sol { border-top-color: #9945ff; }

.ticker-price {
  font-weight: bold;
  transition: color 0.3s, opacity 0.4s;
}

/* Flash */
.flash-up { animation: flashGreen 0.6s ease; }
.flash-down { animation: flashRed 0.6s ease; }

@keyframes flashGreen {
  0% { background: rgba(34,197,94,0.3); }
  100% { background: transparent; }
}
@keyframes flashRed {
  0% { background: rgba(239,68,68,0.3); }
  100% { background: transparent; }
}

/* Mode */
.mode-toggle {
  display: flex;
  background: #111;
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
}

.mode-btn.active {
  background: orange;
  color: #000;
}

/* Select */
select {
  width: 100%;
  padding: 16px;
  margin-bottom: 14px;
  background: #fff;
  border: 1px solid #ddd;
  color: #000;
  border-radius: 8px;
  font-size: 16px;
}

/* Input */
.input-row {
  display: flex;
  gap: 10px;
}

.input-row input {
  flex: 1;
  padding: 14px;
  background: #111;
  border: 1px solid #222;
  color: #fff;
  border-radius: 6px;
  font-size: 16px;
}

#recalcBtn {
  width: 60px;
  background: orange;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* Result */
.result {
  margin-top: 18px;
  padding: 20px;
  background: #111;
  border-radius: 8px;
  display: none;
}

.result.visible { display: block; }

.result-title {
  text-align: center;
  color: #aaa;
  margin-bottom: 14px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.ticker-price span {
  font-size: 11px;
  opacity: 0.8;
  margin-left: 4px;
}
</style>
</head>

<body>

<div class="container">

<h1>CRYPTO CALC</h1>
<p class="subtitle">Live crypto + instant conversion</p>

<div class="ticker">
  <div class="ticker-item btc">BTC <div id="btc" class="ticker-price">—</div></div>
  <div class="ticker-item eth">ETH <div id="eth" class="ticker-price">—</div></div>
  <div class="ticker-item sol">SOL <div id="sol" class="ticker-price">—</div></div>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" id="usdBtn" onclick="setMode('usd')">USD → Crypto</button>
  <button class="mode-btn" id="cryptoBtn" onclick="setMode('crypto')">Crypto → USD</button>
</div>

<select id="coin">
  <option value="all">All Coins</option>
  <option value="btc">Bitcoin</option>
  <option value="eth">Ethereum</option>
  <option value="sol">Solana</option>
</select>

<div class="input-row">
  <input type="number" id="amount" placeholder="Enter amount" oninput="autoConvert()">
  <button id="recalcBtn" onclick="convert()">↻</button>
</div>

<div class="result" id="result"></div>

</div>

<script>
/* STATIC FALLBACK (instant load) */
let prices = {
  btc: 70000,
  eth: 3000,
  sol: 100
};

let lastPrices = {};
let mode = "usd";
let timer;

/* show instantly */
updateTicker();

/* LOAD CACHE */
const cached = localStorage.getItem("crypto_prices");
if (cached) {
  prices = JSON.parse(cached);
  updateTicker();
}

/* FETCH WITH TIMEOUT */
function fetchWithTimeout(url, timeout = 3000) {
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject("timeout"), timeout)
    )
  ]);
}

/* LOAD LIVE PRICES */
async function loadPrices() {
  try {
    const res = await fetchWithTimeout(
      "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd"
    );

    const data = await res.json();

    prices = {
      btc: data.bitcoin.usd,
      eth: data.ethereum.usd,
      sol: data.solana.usd
    };

  } catch {
    try {
      const [btc, eth, sol] = await Promise.all([
        fetchWithTimeout("https://api.coincap.io/v2/assets/bitcoin"),
        fetchWithTimeout("https://api.coincap.io/v2/assets/ethereum"),
        fetchWithTimeout("https://api.coincap.io/v2/assets/solana")
      ]);

      prices = {
        btc: parseFloat((await btc.json()).data.priceUsd),
        eth: parseFloat((await eth.json()).data.priceUsd),
        sol: parseFloat((await sol.json()).data.priceUsd)
      };

    } catch {
      return;
    }
  }

  localStorage.setItem("crypto_prices", JSON.stringify(prices));
  updateTicker();
}

/* UPDATE UI */
function updateTicker() {
  ["btc","eth","sol"].forEach(id => updateCoin(id, prices[id]));
}

function updateCoin(id, price) {
  const el = document.getElementById(id);
  if (!price) return;

  let arrow="", percent="", color="#fff";

  if (lastPrices[id]) {
    const diff = price - lastPrices[id];
    const pct = (diff / lastPrices[id]) * 100;

    if (diff > 0) {
      arrow=" ↑"; percent=` +${pct.toFixed(2)}%`; color="#22c55e";
      el.classList.add("flash-up");
    } else if (diff < 0) {
      arrow=" ↓"; percent=` ${pct.toFixed(2)}%`; color="#ef4444";
      el.classList.add("flash-down");
    }
  }

  el.style.opacity = 0;

  setTimeout(()=>{
    el.innerHTML = `$${price.toLocaleString()}<span>${arrow}${percent}</span>`;
    el.style.opacity = 1;
    el.style.color = color;
  },100);

  setTimeout(()=>{
    el.classList.remove("flash-up","flash-down");
  },600);

  lastPrices[id]=price;
}

/* MODE */
function setMode(m){
  mode=m;
  usdBtn.classList.toggle("active",m==="usd");
  cryptoBtn.classList.toggle("active",m==="crypto");
}

/* AUTO CONVERT */
function autoConvert(){
  clearTimeout(timer);
  timer=setTimeout(convert,300);
}

/* CONVERT (FULL FIXED) */
function convert(){
  const amount = parseFloat(amountInput.value);
  const coin = coinSelect.value;
  if(!amount) return;

  let html = "";

  if(mode === "usd"){
    html += `<div class="result-title">For $${amount.toLocaleString()} you get:</div>`;

    if(coin === "all"){
      html += row("Bitcoin", amount / prices.btc, "BTC");
      html += row("Ethereum", amount / prices.eth, "ETH");
      html += row("Solana", amount / prices.sol, "SOL");
    } else {
      const val = amount / prices[coin];
      const name = coin==="btc"?"Bitcoin":coin==="eth"?"Ethereum":"Solana";
      html += row(name, val, coin.toUpperCase());
    }

  } else {
    html += `<div class="result-title">For ${amount} you get:</div>`;

    if(coin === "all"){
      html += usdRow("Bitcoin", amount * prices.btc);
      html += usdRow("Ethereum", amount * prices.eth);
      html += usdRow("Solana", amount * prices.sol);
    } else {
      const val = amount * prices[coin];
      const name = coin==="btc"?"Bitcoin":coin==="eth"?"Ethereum":"Solana";
      html += usdRow(name, val);
    }
  }

  result.innerHTML = html;
  result.classList.add("visible");
}

/* ROWS */
function row(name,value,sym){
  let c=name==="Bitcoin"?"#f7931a":name==="Ethereum"?"#627eea":"#9945ff";
  return `<div class="row"><span>${name}</span><b style="color:${c}">${value.toFixed(6)} ${sym}</b></div>`;
}

function usdRow(name,value){
  let c=name==="Bitcoin"?"#f7931a":name==="Ethereum"?"#627eea":"#9945ff";
  return `<div class="row"><span>${name}</span><b style="color:${c}">$${value.toLocaleString()}</b></div>`;
}

const amountInput=document.getElementById("amount");
const coinSelect=document.getElementById("coin");
const result=document.getElementById("result");

/* INIT */
loadPrices();
setInterval(loadPrices,30000);
</script>

</body>
</html>
